name: 编译32位Windows EXE
on:
  workflow_dispatch:  # 手动点一下就编译
jobs:
  build:
    runs-on: windows-latest  # GitHub 免费支持 Windows！核心解决问题
    steps:
      - uses: actions/checkout@v4

      # 安装 32位 Python3.8（必须x86）
      - name: Setup Python 3.8 x86
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
          architecture: 'x86'

      # 安装 uv
      - name: Install uv
        run: pip install uv

      # uv 安装依赖（你的项目无requirements.txt）
      - name: Install dependencies with uv
        run: |
          cd project-bulid
          uv sync

      # 安装 Nuitka
      - name: Install Nuitka
        run: pip install nuitka

      # 【完全照搬你的编译命令】生成32位exe
      - name: Build with Nuitka
        run: |
          cd project-bulid/app
          nuitka --standalone --output-dir=../dist --plugin-enable=tk-inter --show-progress --show-memory --include-data-dir=./config=config --include-data-dir=./static=static --mingw64 main.py

      # 上传编译好的32位exe
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: auto-work-bdc-x86
          path: project-bulid/dist/
