name: 编译32位Windows EXE
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.8 x86
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
          architecture: 'x86'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies with uv
        run: |
          cd project-bulid
          uv sync

      - name: Install Nuitka
        run: pip install nuitka

      - name: Build with Nuitka
        run: |
          cd project-bulid/app
          nuitka --standalone --output-dir=../dist --plugin-enable=tk-inter --show-progress --show-memory --include-data-dir=./config=config --include-data-dir=./static=static --mingw64 main.py

      # ✅ 关键修复：路径改成正确的 project-bulid/dist
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: auto-work-bdc-x86
          path: project-bulid/dist/**
